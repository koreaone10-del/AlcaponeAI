name: Build APK from HTML

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-33 platform-tools build-tools;30.0.3'

      - name: Create Android project structure
        run: |
          # إنشاء المجلدات الأساسية
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/chibani/ai
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p gradle/wrapper

          # نسخ ملف HTML الرئيسي إلى مجلد assets
          cp index.html app/src/main/assets/

          # إنشاء AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.chibani.ai">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="Chibani Lotfi AI"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # إنشاء MainActivity.java (WebView محمّل بالملف المحلي)
          cat > app/src/main/java/com/chibani/ai/MainActivity.java << 'EOF'
          package com.chibani.ai;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebSettings;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  webView = new WebView(this);
                  webView.setWebViewClient(new WebViewClient());
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  settings.setAllowFileAccessFromFileURLs(true);
                  settings.setAllowUniversalAccessFromFileURLs(true);
                  setContentView(webView);
                  webView.loadUrl("file:///android_asset/index.html");
              }
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

          # ملف layout بسيط (اختياري)
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent">
              <WebView android:id="@+id/webview"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent" />
          </FrameLayout>
          EOF

          # ملف strings.xml
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">Chibani Lotfi AI</string>
          </resources>
          EOF

          # أيقونة افتراضية (نقطة بيضاء بسيطة) – يمكنك استبدالها بأيقونتك الخاصة لاحقاً
          # سيتم إنشاء أيقونة فارغة لتجنب أخطاء التجميع
          echo "48x48 placeholder" > app/src/main/res/mipmap-hdpi/ic_launcher.png
          # ولكن الأفضل إنشاء أيقونة نصية باستخدام Android Asset Studio؟ سنكتفي بملف dummy لتمرير البناء.
          # بدلاً من ذلك، يمكننا إزالة مرجع الأيقونة من البيان واستخدام @android:drawable/sym_def_app_icon
          # سنقوم بتعديل البيان لإزالة الأيقونة المخصصة مؤقتاً:
          sed -i 's/icon="@mipmap\/ic_launcher"/icon="@android:drawable\/sym_def_app_icon"/' app/src/main/AndroidManifest.xml

          # إنشاء build.gradle على مستوى التطبيق
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.chibani.ai'
              compileSdk 33
              defaultConfig {
                  applicationId "com.chibani.ai"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "13.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
                  }
                  debug {
                      debuggable true
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.webkit:webkit:1.9.0'
          }
          EOF

          # إنشاء build.gradle على مستوى المشروع
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.4.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF

          # settings.gradle
          echo "include ':app'" > settings.gradle
          
          # gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m" > gradle.properties
          
          # gradle-wrapper.properties
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.4.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # تحميل gradle-wrapper.jar الرسمي
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v7.4.2/gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew 2>/dev/null || true

      - name: Build Debug APK with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: assembleDebug
          build-root-directory: .

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chibani-Lotfi-AI-v13
          path: app/build/outputs/apk/debug/*.apk
