# ╔══════════════════════════════════════════════════════════════╗
# ║     🚀 Chibani Lotfi AI — V13 ULTRA APK Builder v3         ║
# ║     Fixed: SDK exit codes + Node 22 + debug output         ║
# ╚══════════════════════════════════════════════════════════════╝
name: 🚀 Build Chibani Lotfi AI APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: 📱 Android APK Build
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🟢 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ─── Android SDK: فقط قبول التراخيص (API 34 مثبت مسبقاً) ──
      - name: 📱 Accept Android Licenses
        run: |
          echo "=== SDK Paths ==="
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          ls "$ANDROID_HOME/platforms/"    2>/dev/null || echo "no platforms dir"
          ls "$ANDROID_HOME/build-tools/"  2>/dev/null || echo "no build-tools dir"

          SDKMGR=$(find "${ANDROID_HOME:-/usr/local/lib/android/sdk}" \
                        -name "sdkmanager" 2>/dev/null | head -1)
          echo "sdkmanager: ${SDKMGR:-NOT FOUND}"

          if [ -n "$SDKMGR" ]; then
            yes | "$SDKMGR" --licenses     > /dev/null 2>&1 || true
            yes | "$SDKMGR" --update       > /dev/null 2>&1 || true
            yes | "$SDKMGR" "platforms;android-34" "build-tools;34.0.0" \
                                           > /dev/null 2>&1 || true
          fi
          echo "✅ Android SDK step done"

      # ─── package.json ─────────────────────────────────────────
      - name: 📦 Create package.json
        run: |
          node -e "
          require('fs').writeFileSync('package.json', JSON.stringify({
            name: 'chibani-lotfi-ai',
            version: '13.0.0',
            description: 'Chibani Lotfi AI V13 ULTRA',
            scripts: { build: 'echo ok' },
            dependencies: {
              '@capacitor/android': '^6.1.2',
              '@capacitor/core':    '^6.1.2'
            },
            devDependencies: {
              '@capacitor/cli': '^6.1.2'
            }
          }, null, 2));
          console.log('✅ package.json created');
          "

      # ─── capacitor.config.json ────────────────────────────────
      - name: ⚙️ Create capacitor.config.json
        run: |
          node -e "
          require('fs').writeFileSync('capacitor.config.json', JSON.stringify({
            appId: 'com.chibani.lotfi.ai',
            appName: 'Chibani Lotfi AI',
            webDir: 'www',
            android: {
              allowMixedContent: true,
              captureInput: true
            },
            server: {
              cleartext: true,
              allowNavigation: ['*']
            }
          }, null, 2));
          console.log('✅ capacitor.config.json created');
          "

      # ─── HTML ─────────────────────────────────────────────────
      - name: 📁 Copy index.html → www/
        run: |
          mkdir -p www
          cp index.html www/index.html
          echo "✅ HTML copied"

      # ─── npm ──────────────────────────────────────────────────
      - name: 📥 npm install
        run: npm install

      # ─── Capacitor ────────────────────────────────────────────
      - name: ➕ cap add android
        run: npx cap add android

      - name: 🔄 cap sync android
        run: npx cap sync android

      # ─── Android patches ──────────────────────────────────────
      - name: 🔧 Patch AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:allowBackup="true"/android:allowBackup="true" android:usesCleartextTraffic="true" android:hardwareAccelerated="true"/' \
            "$MANIFEST"
          echo "✅ Manifest patched"

      - name: 📝 Set version 13.0
        run: |
          sed -i 's/versionCode 1$/versionCode 13/'        android/app/build.gradle
          sed -i 's/versionName "1.0"/versionName "13.0"/' android/app/build.gradle
          echo "✅ Version 13.0"

      # ─── Build ────────────────────────────────────────────────
      - name: 🏗️ Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=512m"
        env:
          ANDROID_HOME:     ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      # ─── Upload ───────────────────────────────────────────────
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ChibaniLotfiAI-V13-ULTRA
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
