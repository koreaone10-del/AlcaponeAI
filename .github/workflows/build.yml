# ╔══════════════════════════════════════════════════════════════╗
# ║        🚀 Chibani Lotfi AI — V13 ULTRA APK Builder          ║
# ║        Capacitor 6 + Android 34 + Debug APK                 ║
# ╚══════════════════════════════════════════════════════════════╝
name: 🚀 Build Chibani Lotfi AI APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:          # يدوي من زر Run workflow

jobs:
  build-apk:
    name: 📱 Android APK Build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      # ─────────────────────────────────────────────────────────
      # 1. استنساخ المستودع
      # ─────────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────
      # 2. Java 17  (مطلوب لـ Gradle)
      # ─────────────────────────────────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ─────────────────────────────────────────────────────────
      # 3. Node.js 20  (مطلوب لـ Capacitor CLI)
      # ─────────────────────────────────────────────────────────
      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ─────────────────────────────────────────────────────────
      # 4. قبول تراخيص Android SDK + تثبيت API 34
      # ─────────────────────────────────────────────────────────
      - name: 📱 Accept Android SDK Licenses & Install API 34
        run: |
          SDKMGR="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMGR" --licenses > /dev/null 2>&1 || true
          "$SDKMGR" "platforms;android-34" "build-tools;34.0.0"

      # ─────────────────────────────────────────────────────────
      # 5. إنشاء package.json (Capacitor 6)
      # ─────────────────────────────────────────────────────────
      - name: 📦 Create package.json
        run: |
          cat > package.json << 'EOF'
{
  "name": "chibani-lotfi-ai",
  "version": "13.0.0",
  "description": "Chibani Lotfi AI V13 ULTRA",
  "scripts": { "build": "echo ok" },
  "dependencies": {
    "@capacitor/android": "^6.1.2",
    "@capacitor/core":    "^6.1.2"
  },
  "devDependencies": {
    "@capacitor/cli": "^6.1.2"
  }
}
EOF

      # ─────────────────────────────────────────────────────────
      # 6. إنشاء capacitor.config.json
      # ─────────────────────────────────────────────────────────
      - name: ⚙️ Create capacitor.config.json
        run: |
          cat > capacitor.config.json << 'EOF'
{
  "appId":   "com.chibani.lotfi.ai",
  "appName": "Chibani Lotfi AI",
  "webDir":  "www",
  "android": {
    "allowMixedContent": true,
    "captureInput": true,
    "webContentsDebuggingEnabled": false
  },
  "server": {
    "cleartext":       true,
    "allowNavigation": ["*"]
  }
}
EOF

      # ─────────────────────────────────────────────────────────
      # 7. نسخ index.html إلى مجلد www/
      # ─────────────────────────────────────────────────────────
      - name: 📁 Copy index.html → www/
        run: |
          mkdir -p www
          cp index.html www/index.html
          echo "✅ index.html copied to www/"

      # ─────────────────────────────────────────────────────────
      # 8. تثبيت Capacitor
      # ─────────────────────────────────────────────────────────
      - name: 📥 npm install (Capacitor)
        run: npm install

      # ─────────────────────────────────────────────────────────
      # 9. إضافة منصة Android
      # ─────────────────────────────────────────────────────────
      - name: ➕ cap add android
        run: npx cap add android

      # ─────────────────────────────────────────────────────────
      # 10. مزامنة الملفات مع Android
      # ─────────────────────────────────────────────────────────
      - name: 🔄 cap sync android
        run: npx cap sync android

      # ─────────────────────────────────────────────────────────
      # 11. تعديل AndroidManifest.xml
      #     - السماح بـ HTTP (للـ APIs)
      #     - تسريع الرسوميات
      # ─────────────────────────────────────────────────────────
      - name: 🔧 Patch AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:allowBackup="true"/android:allowBackup="true"\n        android:usesCleartextTraffic="true"\n        android:hardwareAccelerated="true"/' \
            "$MANIFEST"
          echo "✅ Patched: usesCleartextTraffic + hardwareAccelerated"

      # ─────────────────────────────────────────────────────────
      # 12. تعيين رقم الإصدار 13.0
      # ─────────────────────────────────────────────────────────
      - name: 📝 Set version 13.0 in build.gradle
        run: |
          GRADLE="android/app/build.gradle"
          sed -i 's/versionCode 1$/versionCode 13/'   "$GRADLE"
          sed -i 's/versionName "1.0"/versionName "13.0"/' "$GRADLE"
          echo "✅ versionCode=13  versionName=13.0"

      # ─────────────────────────────────────────────────────────
      # 13. بناء APK (Debug)
      # ─────────────────────────────────────────────────────────
      - name: 🏗️ Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=512m"
        env:
          ANDROID_HOME:     ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      # ─────────────────────────────────────────────────────────
      # 14. إعادة تسمية وجمع APK
      # ─────────────────────────────────────────────────────────
      - name: 📋 Collect & Rename APK
        run: |
          mkdir -p dist
          SRC="android/app/build/outputs/apk/debug/app-debug.apk"
          DST="dist/ChibaniLotfiAI-V13-ULTRA.apk"
          cp "$SRC" "$DST"
          SIZE=$(du -sh "$DST" | cut -f1)

          echo "### ✅ APK جاهز للتحميل!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| المعلومة | القيمة |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 الملف | \`ChibaniLotfiAI-V13-ULTRA.apk\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 📏 الحجم | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔖 الإصدار | 13.0 |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔑 Commit | $GITHUB_SHA |" >> $GITHUB_STEP_SUMMARY

      # ─────────────────────────────────────────────────────────
      # 15. رفع APK كـ Artifact (يبقى 30 يوم)
      # ─────────────────────────────────────────────────────────
      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChibaniLotfiAI-V13-ULTRA
          path: dist/ChibaniLotfiAI-V13-ULTRA.apk
          retention-days: 30
          if-no-files-found: error
