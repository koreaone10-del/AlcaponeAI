# ╔══════════════════════════════════════════════════════════════╗
# ║        🚀 Chibani Lotfi AI — V13 ULTRA APK Builder v2       ║
# ║        Fixed: node -e for JSON files, robust SDK setup      ║
# ╚══════════════════════════════════════════════════════════════╝
name: 🚀 Build Chibani Lotfi AI APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: 📱 Android APK Build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      # ─── 1. Checkout ─────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Java 17 ──────────────────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ─── 3. Node.js 20 ───────────────────────────────────────
      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ─── 4. Android SDK ──────────────────────────────────────
      - name: 📱 Accept Licenses & Install Android API 34
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          SDKMGR=$(find "$SDK_ROOT" -name "sdkmanager" 2>/dev/null | head -1)
          echo "Using sdkmanager: $SDKMGR"
          yes | "$SDKMGR" --licenses > /dev/null 2>&1 || true
          "$SDKMGR" "platforms;android-34" "build-tools;34.0.0"

      # ─── 5. Create package.json (via node, no heredoc) ───────
      - name: 📦 Create package.json
        run: |
          node -e "
          const fs = require('fs');
          const pkg = {
            name: 'chibani-lotfi-ai',
            version: '13.0.0',
            description: 'Chibani Lotfi AI V13 ULTRA',
            scripts: { build: 'echo ok' },
            dependencies: {
              '@capacitor/android': '^6.1.2',
              '@capacitor/core': '^6.1.2'
            },
            devDependencies: {
              '@capacitor/cli': '^6.1.2'
            }
          };
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          console.log('✅ package.json created');
          "

      # ─── 6. Create capacitor.config.json ─────────────────────
      - name: ⚙️ Create capacitor.config.json
        run: |
          node -e "
          const fs = require('fs');
          const cap = {
            appId: 'com.chibani.lotfi.ai',
            appName: 'Chibani Lotfi AI',
            webDir: 'www',
            android: {
              allowMixedContent: true,
              captureInput: true,
              webContentsDebuggingEnabled: false
            },
            server: {
              cleartext: true,
              allowNavigation: ['*']
            }
          };
          fs.writeFileSync('capacitor.config.json', JSON.stringify(cap, null, 2));
          console.log('✅ capacitor.config.json created');
          "

      # ─── 7. Copy HTML ─────────────────────────────────────────
      - name: 📁 Copy index.html to www/
        run: |
          mkdir -p www
          cp index.html www/index.html
          echo "✅ index.html → www/"

      # ─── 8. Install Capacitor ────────────────────────────────
      - name: 📥 npm install
        run: npm install

      # ─── 9. Add Android platform ─────────────────────────────
      - name: ➕ cap add android
        run: npx cap add android

      # ─── 10. Sync ────────────────────────────────────────────
      - name: 🔄 cap sync android
        run: npx cap sync android

      # ─── 11. Patch AndroidManifest ───────────────────────────
      - name: 🔧 Patch AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:allowBackup="true"/android:allowBackup="true" android:usesCleartextTraffic="true" android:hardwareAccelerated="true"/' "$MANIFEST"
          echo "✅ Manifest patched"

      # ─── 12. Set version ─────────────────────────────────────
      - name: 📝 Set version 13.0
        run: |
          sed -i 's/versionCode 1$/versionCode 13/'      android/app/build.gradle
          sed -i 's/versionName "1.0"/versionName "13.0"/' android/app/build.gradle
          echo "✅ Version → 13.0"

      # ─── 13. Build APK ───────────────────────────────────────
      - name: 🏗️ Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=512m"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      # ─── 14. Rename & Summary ────────────────────────────────
      - name: 📋 Collect APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             dist/ChibaniLotfiAI-V13-ULTRA.apk
          SIZE=$(du -sh dist/ChibaniLotfiAI-V13-ULTRA.apk | cut -f1)
          echo "### ✅ APK جاهز!" >> $GITHUB_STEP_SUMMARY
          echo "| الملف | الحجم |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ChibaniLotfiAI-V13-ULTRA.apk | $SIZE |" >> $GITHUB_STEP_SUMMARY

      # ─── 15. Upload Artifact ─────────────────────────────────
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ChibaniLotfiAI-V13-ULTRA
          path: dist/ChibaniLotfiAI-V13-ULTRA.apk
          retention-days: 30
          if-no-files-found: error
