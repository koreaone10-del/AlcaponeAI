# ╔══════════════════════════════════════════════════════════════════╗
# ║  🚀 Chibani Lotfi AI — APK Builder v8 (NodeJS Intelligent Patch)║
# ║  توقيع موثوق 100% — تم التخلص من sed واعتماد الحقن الذكي        ║
# ╚══════════════════════════════════════════════════════════════════╝

name: 🚀 Build Chibani Lotfi AI — Signed APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build-apk:
    name: 📱 Signed Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🟢 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📱 Android SDK Licenses
        run: |
          SDK="/usr/local/lib/android/sdk"
          
          # الموافقة على التراخيص في مجلد النظام فقط دون لمس مجلدات المشروع محلياً
          mkdir -p "$SDK/licenses"
          {
            echo "8933bad161af4178b1185d1a37fbf41ea5269c55"
            echo "d56f5187479451eabf01fb78af6dfcb131a6481e"
            echo "24333f8a63b6825ea9c5514f83c2829b004d1fee"
          } > "$SDK/licenses/android-sdk-license"
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > "$SDK/licenses/android-sdk-preview-license"
          echo "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > "$SDK/licenses/google-gdk-license"
          echo "601085b94cd77f0b54ff86406957099ebe79c4d" > "$SDK/licenses/intel-android-extra-license"
          echo "e9acab5b5fbb560a72cfaecce8946896ff6aab9d" > "$SDK/licenses/android-googletv-license"
          echo "504667f4c0de7af1a06de9f4b1727b84351f2910" > "$SDK/licenses/mips-android-sysimage-license"
          
          yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          echo "✅ تم قبول جميع تراخيص الـ Android SDK بنجاح نظامي"

      # ═══════════════════════════════════════════════════════════
      # 🔑 فحص الـ Secrets
      # ═══════════════════════════════════════════════════════════
      - name: 🔑 Check Signing Secrets
        id: sec_check
        run: |
          echo "═══════════════════════════════════════════"
          HAS_KS="false"; HAS_ALIAS="false"; HAS_KP="false"; HAS_SP="false"
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then HAS_KS="true"; echo "✅ KEYSTORE_BASE64: موجود"; else echo "❌ KEYSTORE_BASE64: غير موجود!"; fi
          if [ -n "${{ secrets.KEY_ALIAS }}" ]; then HAS_ALIAS="true"; echo "✅ KEY_ALIAS: موجود"; else echo "❌ KEY_ALIAS: غير موجود!"; fi
          if [ -n "${{ secrets.KEY_PASSWORD }}" ]; then HAS_KP="true"; echo "✅ KEY_PASSWORD: موجود"; else echo "❌ KEY_PASSWORD: غير موجود!"; fi
          if [ -n "${{ secrets.STORE_PASSWORD }}" ]; then HAS_SP="true"; echo "✅ STORE_PASSWORD: موجود"; else echo "❌ STORE_PASSWORD: غير موجود!"; fi
          if [ "$HAS_KS" = "true" ] && [ "$HAS_ALIAS" = "true" ] && [ "$HAS_KP" = "true" ] && [ "$HAS_SP" = "true" ]; then
            echo "🔏 جميع الأسرار موجودة → بناء RELEASE موقّع"
            echo "will_sign=true" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️ ناقص سر → بناء DEBUG غير موقّع"
            echo "will_sign=false" >> "$GITHUB_OUTPUT"
          fi
          echo "═══════════════════════════════════════════"

      # ═══════════════════════════════════════════════════════════
      # 🔑 فك Keystore وإنشاء ملف الخصائص المباشر
      # ═══════════════════════════════════════════════════════════
      - name: 🔑 Decode & Verify Keystore
        if: steps.sec_check.outputs.will_sign == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD:  ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS:       ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:    ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          if [ ! -s keystore.jks ]; then
            echo "❌ فشل فك base64" && exit 1
          fi

          if keytool -list -keystore keystore.jks -storepass "$STORE_PASSWORD" > /tmp/ktlist.txt 2>&1; then
            echo "✅ STORE_PASSWORD متطابقة"
          else
            echo "❌ STORE_PASSWORD خاطئة!" && exit 1
          fi

          # إعداد ملف الخصائص بمسار محلي داخلي مباشر لتفادي مشاكل الـ (../../)
          {
            echo "storeFile=keystore.jks"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > keystore.properties
          echo "✅ تم تجهيز ملف الخصائص بنجاح"

      - name: 📦 package.json
        run: |
          node -e "
          require('fs').writeFileSync('package.json', JSON.stringify({
            name:'chibani-lotfi-ai', version:'13.0.0',
            description:'Chibani Lotfi AI V13 ULTRA',
            scripts:{build:'echo ok'},
            dependencies:{'@capacitor/android':'^6.1.2','@capacitor/core':'^6.1.2'},
            devDependencies:{'@capacitor/cli':'^6.1.2'}
          },null,2));
          "

      - name: ⚙️ capacitor.config.json
        run: |
          node -e "
          require('fs').writeFileSync('capacitor.config.json', JSON.stringify({
            appId:'com.chibani.lotfi.ai',
            appName:'Chibani Lotfi AI',
            webDir:'www',
            android:{allowMixedContent:true,captureInput:true},
            server:{cleartext:true,allowNavigation:['*']}
          },null,2));
          "

      - name: 📁 Copy index.html → www/
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: 📥 npm install
        run: npm install

      - name: ➕ cap add android
        run: npx cap add android

      - name: 🔄 cap sync android
        run: npx cap sync android

      - name: 🔧 Patch AndroidManifest.xml
        run: |
          M="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:allowBackup="true"/android:allowBackup="true" android:usesCleartextTraffic="true" android:hardwareAccelerated="true"/' "$M"

      # ═══════════════════════════════════════════════════════════
      # 🔏 حقن برمجيات التوقيع الذكي باستخدام محرك Node.js
      # ═══════════════════════════════════════════════════════════
      - name: 🔏 Inject Signing Config (Intelligent NodeJS Patch)
        run: |
          if [ "${{ steps.sec_check.outputs.will_sign }}" = "true" ]; then
            # وضع ملفات المفاتيح بداخل المجلد الخاص بالتطبيق مباشرة لحماية المسار
            cp keystore.properties android/app/keystore.properties
            cp keystore.jks android/app/keystore.jks

            node -e "
            const fs = require('fs');
            const gradlePath = 'android/app/build.gradle';
            if (!fs.existsSync(gradlePath)) {
                console.error('❌ الخطأ: لم يتم العثور على ملف build.gradle!');
                process.exit(1);
            }
            let content = fs.readFileSync(gradlePath, 'utf8');

            // 1. كود تحميل ملف الخصائص من المجلد الحالي للـ app
            const propsCode = [
                'def keystorePropertiesFile = file(\"keystore.properties\")',
                'def keystoreProperties = new Properties()',
                'if (keystorePropertiesFile.exists()) {',
                '    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))',
                '}'
            ].join('\n');

            content = propsCode + '\n' + content;

            // 2. كود بناء الـ signingConfigs
            const signingConfigsCode = [
                '    signingConfigs {',
                '        release {',
                '            storeFile file(keystoreProperties.getProperty(\"storeFile\", \"keystore.jks\"))',
                '            storePassword keystoreProperties.getProperty(\"storePassword\", \"\")',
                '            keyAlias keystoreProperties.getProperty(\"keyAlias\", \"\")',
                '            keyPassword keystoreProperties.getProperty(\"keyPassword\", \"\")',
                '        }',
                '    }'
            ].join('\n');

            // حقن الـ signingConfigs كأول عنصر داخل البلوك android {
            content = content.replace(/android\s*\{/, 'android {\n' + signingConfigsCode);

            // 3. ربط الـ buildTypes بالتوقيع الجديد لنسخة الـ release
            content = content.replace(/release\s*\{/, 'release {\n            signingConfig signingConfigs.release');

            // 4. ترقية الـ versionCode والـ versionName تلقائياً
            content = content.replace(/versionCode\s+\d+/, 'versionCode 13');
            content = content.replace(/versionName\s+\"[^\"]+\"/, 'versionName \"13.0\"');

            fs.writeFileSync(gradlePath, content, 'utf8');
            console.log('✅ تم تعديل وحقن ملف build.gradle بالكامل بنجاح مذهل وبدون أخطاء sed.');
            "
            
            echo "── معاينة هيكلة ملف build.gradle المعدل ──"
            sed -n '/android {/,/}/p' android/app/build.gradle | head -25
          else
            echo "⚠️ تخطي التوقيع — بناء نسخة Debug عادية"
          fi

      # ═══════════════════════════════════════════════════════════
      # 🏗️ بناء الـ APK المستقر والموقع
      # ═══════════════════════════════════════════════════════════
      - name: 🏗️ Build APK
        run: |
          cd android
          chmod +x gradlew
          if [ "${{ steps.sec_check.outputs.will_sign }}" = "true" ]; then
            echo "🔏 Building SIGNED Release APK..."
            ./gradlew assembleRelease \
              -x lintVitalRelease -x lintVitalAnalyzeRelease -x lintVitalReportRelease \
              --no-daemon --stacktrace \
              -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=512m"
          else
            echo "🔧 Building Debug APK..."
            ./gradlew assembleDebug --no-daemon --stacktrace \
              -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=512m"
          fi

      - name: 📋 Collect APK
        run: |
          mkdir -p dist
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          cp "$APK" dist/ChibaniLotfiAI-V13-ULTRA.apk
          SIZE=$(du -sh dist/ChibaniLotfiAI-V13-ULTRA.apk | cut -f1)
          if [[ "$APK" == *"release"* ]]; then
            echo "### ✅ APK موقّع ومحمي وجاهز (Release) — $SIZE" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ APK Debug غير موقّع — $SIZE" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ChibaniLotfiAI-V13-ULTRA
          path: dist/ChibaniLotfiAI-V13-ULTRA.apk
          retention-days: 30
          if-no-files-found: error
